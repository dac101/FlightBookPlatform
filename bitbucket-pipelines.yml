# FlightBook Platform - CI/CD Pipeline

image: php:8.4-cli

definitions:
  caches:
    npm: ~/.npm
  steps:
    - step: &lint
        name: Lint (Pint + Prettier + ESLint)
        image: php:8.4-cli
        caches:
          - composer
          - npm
        script:
          - apt-get update -qq && apt-get install -y -qq unzip git curl nodejs npm
          - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          - composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          - npm ci
          - vendor/bin/pint --parallel --test
          - npm run format:check
          - npm run lint:check

    - step: &test
        name: Tests (PHP 8.4)
        image: php:8.4-cli
        caches:
          - composer
          - npm
        script:
          - apt-get update -qq && apt-get install -y -qq unzip git curl nodejs npm libsqlite3-dev
          - docker-php-ext-install pdo pdo_sqlite
          - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          - composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          - npm ci
          - cp .env.example .env
          - php artisan key:generate
          - npm run build
          - ./vendor/bin/phpunit

pipelines:
  branches:
    main:
#      - step: *lint
#      - step: *test
      - step:
          name: Deploy to production
          deployment: production
          script:
            - pipe: atlassian/ssh-run:0.8.1
              variables:
                SSH_USER: 'ubuntu'
                SERVER: '100.51.99.192'
                COMMAND: |
                  set -e

                  if [ ! -d /var/www/flightbookplatform/.git ]; then
                    echo "[REMOTE] First deploy — cloning repo..."
                    git clone git@bitbucket.org:$BITBUCKET_REPO_FULL_NAME.git /var/www/flightbookplatform
                  fi

                  cd /var/www/flightbookplatform

                  echo "[REMOTE] Setting permissions..."
                  sudo chown -R ubuntu:www-data /var/www/flightbookplatform/storage /var/www/flightbookplatform/bootstrap/cache
                  sudo chmod -R 775 /var/www/flightbookplatform/storage /var/www/flightbookplatform/bootstrap/cache

                  echo "[REMOTE] Pulling latest code..."
                  git checkout main
                  git fetch origin
                  git reset --hard origin/$BITBUCKET_BRANCH

                  cat > .env << EOF
                  APP_NAME="FlightBook Platform"
                  APP_ENV=production
                  APP_KEY=${APP_KEY}
                  APP_DEBUG=false
                  APP_URL=${APP_URL}

                  DB_CONNECTION=pgsql
                  DB_HOST=${DB_HOST}
                  DB_PORT=5432
                  DB_DATABASE=${DB_DATABASE}
                  DB_USERNAME=${DB_USERNAME}
                  DB_PASSWORD=${DB_PASSWORD}

                  LOG_CHANNEL=stack
                  LOG_STACK="daily,slack"
                  LOG_LEVEL=info
                  LOG_SLACK_LEVEL=error
                  LOG_SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
                  LOG_SLACK_USERNAME=flightbookplatform

                  SESSION_DRIVER=database
                  SESSION_LIFETIME=120
                  CACHE_STORE=redis
                  QUEUE_CONNECTION=redis

                  MAIL_MAILER=${MAIL_MAILER}
                  MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
                  MAIL_FROM_NAME="FlightBook Platform"

                  REDIS_CLIENT=phpredis
                  REDIS_HOST=127.0.0.1
                  REDIS_PASSWORD=null
                  REDIS_PORT=6379

                  AVIATIONSTACK_API_KEY=${AVIATIONSTACK_API_KEY}
                  EOF

                  echo "[REMOTE] Installing composer dependencies..."
                  composer install --no-dev --optimize-autoloader --no-interaction

                  echo "[REMOTE] Installing npm dependencies and building assets..."
                  npm ci
                  npm run build

                  echo "[REMOTE] Unzipping airports CSV..."
                  unzip -o public/airports.csv.zip -d public/

                  echo "[REMOTE] Running migrations..."
                  php artisan migrate --force

                  echo "[REMOTE] Publishing Telescope assets..."
                  php artisan telescope:publish --force

                  echo "[REMOTE] Clearing old caches..."
                  php artisan optimize:clear

                  echo "[REMOTE] Rebuilding caches..."
                  php artisan optimize

                  echo "[REMOTE] Reloading services..."
                  sudo systemctl reload php8.4-fpm
                  sudo systemctl reload nginx

                  echo "[REMOTE] Setting up Horizon systemd service..."
                  sudo tee /etc/systemd/system/horizon.service > /dev/null << 'SYSTEMD'
                  [Unit]
                  Description=Laravel Horizon Queue Manager
                  After=network.target redis-server.service

                  [Service]
                  User=ubuntu
                  Group=www-data
                  WorkingDirectory=/var/www/flightbookplatform
                  ExecStart=/usr/bin/php artisan horizon
                  Restart=always
                  RestartSec=5
                  StandardOutput=append:/var/www/flightbookplatform/storage/logs/horizon.log
                  StandardError=append:/var/www/flightbookplatform/storage/logs/horizon.log

                  [Install]
                  WantedBy=multi-user.target
                  SYSTEMD

                  sudo systemctl daemon-reload
                  sudo systemctl enable horizon

                  echo "[REMOTE] Terminating old Horizon workers gracefully..."
                  php artisan horizon:terminate || true

                  echo "[REMOTE] Restarting Horizon..."
                  sudo systemctl restart horizon

                  echo "[REMOTE] Deploy complete!"




